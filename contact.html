<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borden Design | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --borden-dark: #0a0b10;
            --borden-card: #131520;
            --borden-platinum: #e2e8f0;
            --borden-accent: #00f2fe; 
            --borden-text-muted: #8ea0dd;
            --gradient-accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        }

        /* Reset and Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--borden-dark); 
            color: #ffffff; 
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Clean Document Flow Navigation (No Overlaps) */
        nav {
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #0a0b10;
            width: 100%;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { height: 50px; width: 50px; border-radius: 8px; object-fit: cover; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
        
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: #ffffff; font-weight: 500; font-size: 0.95rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--borden-accent); }
        .btn-cta { background: transparent; border: 1px solid var(--borden-accent); padding: 10px 22px; border-radius: 25px; color: var(--borden-accent) !important; font-weight: 600; transition: 0.3s; }
        .btn-cta:hover { background: var(--gradient-accent); color: var(--borden-dark) !important; border-color: transparent; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transform: scale(1.03); }

        /* Main Page Layout Wrapper */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 60px 40px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* Page Intro Section */
        .page-header {
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .page-title { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--borden-platinum); margin-bottom: 16px; }
        .page-title span { background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-subtitle { font-size: 1.1rem; color: var(--borden-text-muted); max-width: 600px; margin: 0 auto; }

        /* Two Column Dynamic Contact Layout */
        .contact-content-wrapper {
            display: flex;
            gap: 40px;
            align-items: stretch;
            width: 100%;
        }

        /* Premium Form Input Box */
        .form-container {
            background: var(--borden-card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            flex: 1.2;
            transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .form-container:hover { border-color: rgba(0, 242, 254, 0.15); box-shadow: 0 15px 35px rgba(0, 242, 254, 0.08); }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--borden-text-muted); margin-bottom: 8px; }
        
        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(10, 11, 16, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--borden-accent);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
            background: rgba(19, 21, 32, 0.8);
        }
        .btn-submit {
            background: var(--gradient-accent);
            color: var(--borden-dark);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-submit:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.5); }

        /* Cinematic Contact Visual Sidebar */
        .contact-visual-panel {
            flex: 1;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            background: #111219;
            display: flex;
            flex-direction: column;
        }
        .contact-visual-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            transition: 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .contact-content-wrapper:hover .contact-visual-panel img {
            opacity: 0.95;
            transform: scale(1.03);
        }

        /* Direct Contact Information Footprint */
        .direct-connect-channels {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            width: 100%;
            margin-top: 10px;
        }
        .channel-card {
            text-align: center;
            flex: 1;
            padding: 24px 20px;
            background: rgba(19, 21, 32, 0.4);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .channel-card:hover { transform: translateY(-4px) scale(1.02); border-color: rgba(0, 242, 254, 0.2); box-shadow: 0 8px 20px rgba(0, 242, 254, 0.08); }
        .channel-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--borden-text-muted);
            margin-bottom: 8px;
        }
        .channel-link {
            color: var(--borden-platinum);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .channel-link:hover { color: var(--borden-accent); }

        /* Global Footer */
        footer { border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 40px 0; text-align: center; font-size: 0.85rem; color: var(--borden-text-muted); background: #08090d; width: 100%; margin-top: auto; }

        /* Mobile Viewports styling rules */
        @media (max-width: 900px) {
            .contact-content-wrapper { flex-direction: column; }
            .contact-visual-panel { display: none; }
        }
        @media (max-width: 768px) {
            .page-title { font-size: 2.3rem; }
            .nav-links { display: none; } 
            main { padding: 40px 20px; }
            .form-container { padding: 30px 20px; }
            .direct-connect-channels { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <img src="borden-logo.png" alt="Borden Design Logo">
            <span class="logo-text">BORDEN DESIGN</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html" style="color: var(--borden-accent);">Contact</a>
            <a href="contact.html" class="btn-cta">Get a Quote</a>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <h1 class="page-title">Let's <span>Connect</span></h1>
            <p class="page-subtitle">Ready to optimize your workflow or launch a fresh digital brand asset? Fill out the brief below.</p>
        </section>

        <div class="contact-content-wrapper">
            <div class="form-container">
                <form name="borden-contact" method="POST" data-netlify="true">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="project-type">Project Scope</label>
                        <input type="text" id="project-type" name="project-type" placeholder="e.g., Website Development, Logo Design, CRM Tuning">
                    </div>
                    <div class="form-group">
                        <label for="message">Project Requirements</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Submit Inquiry</button>
                </form>
            </div>

            <div class="contact-visual-panel">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" alt="High-Speed Digital Communications Framework">
            </div>
        </div>

        <section class="direct-connect-channels">
            <div class="channel-card">
                <div class="channel-label">Direct Email</div>
                <a href="mailto:bordendesign@gmail.com" class="channel-link">bordendesign@gmail.com</a>
            </div>
            <div class="channel-card">
                <div class="channel-label">Phone / WhatsApp</div>
                <a href="https://wa.me/50493400993" target="_blank" rel="noopener noreferrer" class="channel-link">(504) 9340-0993</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Borden Design. All Rights Reserved.</p>
    </footer>

</body>
</html>
